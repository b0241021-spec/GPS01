name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \; || echo "No zip files found"

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== Step 1 - 修復 Linux 執行相容性 ====================
    - name: Step 1 - Pre-initialize and Sanitize Wrapper
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        echo "=== Gradle Wrapper 健全度檢查 ==="
        ls -la gradlew

    # ==================== Step 2 - 獨立大腦存取測試（最優先，失敗直接跳出） ====================
    - name: Step 2 - Absolute Brain Storage Access Test (Fail-Fast)
      run: |
        echo "=================================================="
        echo "🧠 [大腦存取測試] 開始驗證記憶體 CRUD 生命週期..."
        echo "=================================================="
        python3 -c "
        import sys
        test_memory = {}
        test_memory['mock_location'] = 'lat:25.0330,lng:121.5654'
        if test_memory.get('mock_location') != 'lat:25.0330,lng:121.5654':
            sys.exit(1)
        del test_memory['mock_location']
        if test_memory.get('mock_location') is not None:
            sys.exit(1)
        print('✅ [大腦存取測試通過] CRUD 功能完全正常！')
        " || { echo "❌ [關鍵錯誤] 大腦存取測試失敗！中斷所有後續步驟。"; exit 1; }

    # ==================== Step 3 - 👑 用呼叫程式的方式運作整個流程 ====================
    - name: Step 3 - Execute Healing and Compilation Pipeline
      working-directory: ./gps-simulator-android
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"
      run: |
        # 👑 直接呼叫實體 Python 程式，100% 避開 Actions 引號地獄！
        python3 run_healing_pipeline.py

    # ==================== Step 4 - 自動 Git Push 修復後的代碼與 JSON ====================
    - name: Step 4 - Commit and Push Auto-Healed Code & Learning JSON
      run: |
        git config --global user.name "Gemini Auto-Healing Bot"
        git config --global user.email "gemini-bot@actions.github.com"
        
        git add -A
        if git diff-index --quiet HEAD --; then
          echo "No code changes or learning updates detected. Skipping Git Push."
        else
          echo "🤖 偵測到程式碼修復與學習經驗更新！正在自動 Commit & Push 回 Repo..."
          git commit -m "chore(auto-heal): Repaired compiler errors, sorted brain logs & updated learning JSON [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        fi

    # ==================== Step 5 - 匯出與導出 APK ====================
    - name: Step 5 - Export Final Decided APK
      run: |
        mkdir -p output_apk
        find . -name "*.apk" -exec cp {} ./output_apk/gps-simulator-debug.apk \; || echo "No APK found to copy"
        echo "=== 匯出檔案體積確認 ==="
        ls -l ./output_apk/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-AutoHealed-APK
        path: ./output_apk/gps-simulator-debug.apk
        if-no-files-found: error
