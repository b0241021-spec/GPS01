name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \; || echo "No zip files found"

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    - name: Step 1 - Eliminate Duplicated State File
      run: |
        cd gps-simulator-android
        # 直接刪除導致重複宣告 (Redeclaration) 的舊狀態檔案
        rm -f app/src/main/java/com/gpssimulator/data/GPSSimulatorState.kt || true
        echo "Successfully cleaned up old conflicting state files."

    - name: Step 2 - Fix UI Variable Typos via Linux Sed
      run: |
        cd gps-simulator-android
        # 用 sed 直接修改 MainActivity.kt，把寫錯的 tvCustomCurrentGps 換成正確的 tvCurrentGps
        # 同時確保所有 SimulationState 的欄位呼叫正確
        find app/src/main/java -name "MainActivity.kt" -exec sed -i 's/tvCustomCurrentGps/tvCurrentGps/g' {} \;
        echo "Successfully patched variable names in MainActivity."

    - name: Step 3 - Patch Build Configs safely
      run: |
        cd gps-simulator-android
        # 強制覆寫 build.gradle 以免版本不合
        echo "plugins { id 'com.android.application' version '7.3.1' apply false; id 'org.jetbrains.kotlin.android' version '1.7.20' apply false }" > build.gradle

    - name: Step 4 - Create Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew

    - name: Step 5 - Final Compile Production APK
      working-directory: ./gps-simulator-android
      run: |
        ./gradlew clean assembleDebug --no-daemon --no-build-cache

    - name: Step 6 - Export APK to Root Directory
      run: |
        mkdir -p output_apk
        find . -name "*.apk" -exec cp {} ./output_apk/gps-simulator-debug.apk \;
        echo "=== Exported APK File List: ==="
        ls -l ./output_apk/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: ./output_apk/gps-simulator-debug.apk
        if-no-files-found: error
