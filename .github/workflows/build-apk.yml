name: Build Android Native APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出原始碼 (確保拉回來的是乾淨、沒被剛才 sed 搞壞引號的原始檔案)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 解壓縮專案
    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    # 3. 設定相容性最高的 Java 17 環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4. 直接下載並安裝 Android 官方最通用的 Gradle 7.4.2 Wrapper
    # (這個版本上能相容 Java 17，下能相容舊版 DataBinding，不需修改任何專案程式碼)
    - name: Install and Generate Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        wget https://services.gradle.org/distributions/gradle-7.4.2-bin.zip
        unzip -q gradle-7.4.2-bin.zip
        ./gradle-7.4.2/bin/gradle wrapper --gradle-version 7.4.2

    # 5. 給予 gradlew 執行權限
    - name: Grant execute permission for gradlew
      working-directory: ./gps-simulator-android
      run: chmod +x gradlew

    # 6. 編譯不需要金鑰的 Debug APK
    - name: Build with Gradle
      working-directory: ./gps-simulator-android
      run: ./gradlew assembleDebug

    # 7. 蒐集產出的 APK 並上傳
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: |
          gps-simulator-android/app/build/outputs/apk/debug/*.apk
