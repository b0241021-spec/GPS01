name: Build Android Native APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 解壓縮專案
    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    # 3. 設定 Java 環境 (Android 構建核心)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4. 給予 Gradle 執行權限 (原生專案必備步驟)
    - name: Grant execute permission for gradlew
      working-directory: ./gps-simulator-android
      run: chmod +x gradlew

    # 5. 執行編譯 Release APK
    - name: Build with Gradle
      working-directory: ./gps-simulator-android
      run: ./gradlew assembleRelease

    # 6. 自動搜尋編譯完成的 APK 並上傳
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: |
          gps-simulator-android/app/build/outputs/apk/release/*.apk
