name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== 步驟一：專案環境淨化 + 原始碼還原 + 缺失套件強力強注 ====================
    - name: Step 1 - Smart Purge & Absolute Import Injection
      run: |
        cd gps-simulator-android
        set -e
        
        rm -rf .gradle build app/build || true

        mkdir -p /tmp/orig_src /tmp/orig_res
        cp -r app/src/main/java/* /tmp/orig_src/ 2>/dev/null || true
        cp -r app/src/main/res/* /tmp/orig_res/ 2>/dev/null || true

        rm -f build.gradle || true
        echo "plugins { id 'com.android.application' version '7.3.1' apply false; id 'org.jetbrains.kotlin.android' version '1.7.20' apply false }" > build.gradle

        echo "plugin
