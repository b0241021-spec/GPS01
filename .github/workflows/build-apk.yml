name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \; || echo "No zip files found"

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== 👑 關鍵防禦：修復 Linux 執行相容性 ====================
    - name: Step 1 - Pre-initialize and Sanitize Wrapper
      working-directory: ./gps-simulator-android
      run: |
        # 1. 重新生成強健的 Gradle Wrapper
        gradle wrapper --gradle-version 7.5
        
        # 2. 👑 極重要：消除 Windows 換行符號 (CRLF -> LF)，防止 Linux 執行時閃退
        sed -i 's/\r$//' gradlew
        
        # 3. 賦予可執行權限
        chmod +x gradlew
        
        echo "=== Gradle Wrapper 健全度檢查 ==="
        ls -la gradlew

    # ==================== 🧠 核心：自癒編譯 + 自動記錄學習 JSON ====================
    - name: Step 2 - Execute 10-Cycle Auto-Healing & Debugging Log Engine
      working-directory: ./gps-simulator-android
      run: |
        echo "=== 🚀 啟動自癒診斷與深度曝光引擎 (最大嘗試 10 次) ==="
        
        for i in {1..10}; do
          echo ""
          echo "=================================================="
          echo "🔄 [第 $i / 10 次嘗試] 開始編譯..."
          echo "=================================================="
          
          # 1. 執行編譯，並將錯誤輸出完整記錄到 gradle_build.log (不使用 daemon 以免日誌被截斷)
          ./gradlew clean assembleDebug --no-daemon --no-build-cache > gradle_build.log 2>&1
          COMPILE_STATUS=$?
          
          # 2. 如果編譯成功
          if [ $COMPILE_STATUS -eq 0 ]; then
            echo "🎉 恭喜！第 $i 次編譯完美成功！"
            python3 -c "
            import json, datetime, os
            p_json = '../gemini_learning_context.json'
            if os.path.exists(p_json):
                db = json.load(open(p_json))
                run_log = {
                    'timestamp': datetime.datetime.now().isoformat(),
                    'cycle_attempt': $i,
                    'status': 'SUCCESS',
                    'actions_taken': ['Compilation passed successfully. System compatibility verified.']
                }
                db['auto_healing_runs'].append(run_log)
                json.dump(db, open(p_json, 'w', encoding='utf-8'), indent=2, ensure_ascii=False)
            "
            break
          fi
          
          # ==================== 🚨 關鍵除錯曝光 ====================
          echo "🚨 [第 $i 次嘗試] 編譯失敗！強制印出最後 80 行日誌以供診斷："
          echo "------------------------------------------------------------"
          if [ -f gradle_build.log ]; then
            tail -n 80 gradle_build.log
          else
            echo "找不到 gradle_build.log 檔案！這代表 gradlew 連啟動都沒有啟動成功。"
          fi
          echo "------------------------------------------------------------"
          
          echo "🛠️ 啟動自癒規則匹配進行原地手術..."
          
          # 使用 Python 進行多維度自癒，並動態寫入學習日誌 json
          python3 -c "
          import os, re, json, datetime
          
          log_exists = os.path.exists('gradle_build.log')
          log_content = open('gradle_build.log', 'r', encoding='utf-8', errors='ignore').read() if log_exists else ''
          p_json = '../gemini_learning_context.json'
          
          actions_taken = []
          detected_errors = []
          
          # -------- 規則 0: 處理 gradlew 啟動即崩潰的問題 (全新加入的歷史經驗) --------
          if not log_exists or len(log_content.strip()) == 0:
              detected_errors.append('Gradlew Boot Crash / Empty Log')
              # 強制用 bash 重新轉檔一次，並修復執行權限
              os.system('sed -i \"s/\\r$//\" gradlew')
              os.system('chmod +x gradlew')
              actions_taken.append('Sanitized gradlew line endings (CRLF -> LF) and restored execution permissions.')
          
          # -------- 規則 1: 解決 Redeclaration --------
          if 'Redeclaration: SimulationState' in log_content:
              detected_errors.append('Redeclaration: SimulationState')
              target_dup = 'app/src/main/java/com/gpssimulator/data/SimulationState.kt'
              if os.path.exists(target_dup):
                  os.remove(target_dup)
                  actions_taken.append('Removed duplicate file: SimulationState.kt')
              
          # -------- 規則 2: 解決 TIRAMISU / POST_NOTIFICATIONS SDK 相容問題 --------
          if 'Unresolved reference: TIRAMISU' in log_content or 'Unresolved reference: POST_NOTIFICATIONS' in log_content:
              detected_errors.append('Unresolved reference: TIRAMISU / POST_NOTIFICATIONS')
              for root, dirs, files in os.walk('.'):
                  for f in files:
                      if f == 'MainActivity.kt':
                          p = os.path.join(root, f)
                          code = open(p, 'r').read()
                          code = code.replace('Build.VERSION_CODES.TIRAMISU', '33')
                          code = code.replace('Manifest.permission.POST_NOTIFICATIONS', '\"android.permission.POST_NOTIFICATIONS\"')
                          open(p, 'w').write(code)
                          actions_taken.append(f'Modified {p}: Downgraded Tiramisu references.')

          # -------- 規則 3: 解決 tvCustomCurrentGps 變數名拼寫錯誤 --------
          if 'Unresolved reference: tvCustomCurrentGps' in log_content:
              detected_errors.append('Unresolved reference: tvCustomCurrentGps')
              for root, dirs, files in os.walk('.'):
                  for f in files:
                      if f == 'MainActivity.kt':
                          p = os.path.join(root, f)
                          code = open(p, 'r').read()
                          code = code.replace('tvCustomCurrentGps', 'tvCurrentGps')
                          open(p, 'w').write(code)
                          actions_taken.append(f'Modified {p}: Standardized UI variable to tvCurrentGps.')

          # -------- 規則 4: 解決 GPSSimulatorStateManager 遺失問題 --------
          if 'Unresolved reference: GPSSimulatorStateManager' in log_content:
              detected_errors.append('Unresolved reference: GPSSimulatorStateManager')
              os.makedirs('app/src/main/java/com/gpssimulator/data', exist_ok=True)
              p_mgr = 'app/src/main/java/com/gpssimulator/data/GPSSimulatorStateManager.kt'
              manager_code = '''package com.gpssimulator.data
              import com.gpssimulator.data.SimulationState
              object GPSSimulatorStateManager {
                  var state = SimulationState()
                  fun updateState(newState: SimulationState) { state = newState }
              }'''
              open(p_mgr, 'w').write(manager_code)
              actions_taken.append(f'Created fallback class: {p_mgr}')

          # -------- 規則 5: 解決 import 衝突與重複引入 --------
          if 'Conflicting import' in log_content:
              detected_errors.append('Conflicting import')
              for root, dirs, files in os.walk('.'):
                  for f in files:
                      if f == 'MainActivity.kt':
                          p = os.path.join(root, f)
                          lines = open(p).readlines()
                          seen_imports = set()
                          clean_lines = []
                          for line in lines:
                              if line.strip().startswith('import '):
                                  if line not in seen_imports:
                                      seen_imports.add(line)
                                      clean_lines.append(line)
                              else:
                                  clean_lines.append(line)
                          open(p, 'w').write(''.join(clean_lines))
                          actions_taken.append(f'Cleaned up duplicated imports in {p}.')

          # 寫入 JSON 學習庫
          if os.path.exists(p_json) and (actions_taken or detected_errors):
              db = json.load(open(p_json))
              run_log = {
                  'timestamp': datetime.datetime.now().isoformat(),
                  'cycle_attempt': $i,
                  'status': 'FAILED_BUT_HEALED',
                  'detected_errors': detected_errors,
                  'actions_taken': actions_taken
              }
              db['auto_healing_runs'].append(run_log)
              json.dump(db, open(p_json, 'w', encoding='utf-8'), indent=2, ensure_ascii=False)
              print(f'✅ [學習檔案更新] 成功將此輪錯誤與自癒動作寫入 gemini_learning_context.json')
          "
          
          if [ $i -eq 10 ]; then
            echo "❌ 已達到 10 次極限嘗試，列印完整錯誤日誌："
            [ -f gradle_build.log ] && cat gradle_build.log || echo "日誌不存在。"
            exit 1
          fi
        done

    # ==================== 👑 關鍵步驟：將自癒後的程式碼與學習日誌自動 Git Push ====================
    - name: Step 3 - Commit and Push Auto-Healed Code & Learning JSON
      run: |
        git config --global user.name "Gemini Auto-Healing Bot"
        git config --global user.email "gemini-bot@actions.github.com"
        
        git add -A
        if git diff-index --quiet HEAD --; then
          echo "No code changes or learning updates detected. Skipping Git Push."
        else
          echo "🤖 偵測到程式碼修復與學習經驗更新！正在自動 Commit & Push 回 Repo..."
          git commit -m "chore(auto-heal): Auto-repaired compiler errors & updated gemini_learning_context.json [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        fi

    # ==================== Step 4 - 匯出與導出 APK ====================
    - name: Step 4 - Export Final Decided APK
      run: |
        mkdir -p output_apk
        find . -name "*.apk" -exec cp {} ./output_apk/gps-simulator-debug.apk \; || echo "No APK found to copy"
        echo "=== 匯出檔案體積確認 ==="
        ls -l ./output_apk/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-AutoHealed-APK
        path: ./output_apk/gps-simulator-debug.apk
        if-no-files-found: error
