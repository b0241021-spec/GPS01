name: Gemini AI Loop-Healing Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Prepare Android Standard Environment
      working-directory: ./gps-simulator-android
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        # 補齊所有 mipmap 圖示
        for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
          mkdir -p app/src/main/res/$dir
          cat << 'EOF' > app/src/main/res/$dir/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
          cp app/src/main/res/$dir/ic_launcher.png app/src/main/res/$dir/ic_launcher_round.png
        done

    - name: Hard Fix Kotlin Files Structure
      working-directory: ./gps-simulator-android
      run: |
        TARGET_KT="app/src/main/java/com/gpssimulator/ui/MainActivity.kt"
        SERVICE_KT="app/src/main/java/com/gpssimulator/service/GPSSimulationService.kt"
        
        echo "=== 🛠️ 開始強力清洗並重組 Kotlin 程式碼 ==="
        
        # 1. 清洗 MainActivity.kt：移除前面被 AI 亂插在 package 之前的 import
        if [ -f "$TARGET_KT" ]; then
          # 找出真正的 package 那一行，並丟棄它之前的所有內容
          sed -i -n '/package com.gpssimulator/,$p' "$TARGET_KT"
          
          # 在 package 下方精準插入正確、不重複的常用 import 聲明
          sed -i '/package com.gpssimulator.ui/a \\nimport androidx.core.content.ContextCompat\nimport com.gpssimulator.data.SimulationState\nimport com.gpssimulator.service.GPSSimulationService' "$TARGET_KT"
          
          # 修正 Kotlin Flow 收集器的老舊語法衝突
          sed -i "s/collect\s*{\s*$/collect { state ->/g" "$TARGET_KT" || true
          sed -i "s/collect\s*{\s*it\s*->/collect { state ->/g" "$TARGET_KT" || true
        fi
        
        # 2. 清洗 GPSSimulationService.kt：確保 R 套件與 ContextCompat 正常匯入
        if [ -f "$SERVICE_KT" ]; then
          sed -i -n '/package com.gpssimulator/,$p' "$SERVICE_KT"
          sed -i '/package com.gpssimulator.service/a \\nimport androidx.core.content.ContextCompat\nimport com.gpssimulator.R' "$SERVICE_KT"
        fi
        
        echo "=== 📝 清洗完成 ==="

    - name: Prepare Executable
      working-directory: ./gps-simulator-android
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    # 直接送去編譯，不再交給 AI 瞎指揮
    - name: Direct Build Verification
      working-directory: ./gps-simulator-android
      run: |
        echo "🚀 執行最終編譯..."
        ./gradlew assembleDebug --no-daemon

    - name: Verify APK Location
      if: success()
      run: |
        find . -name "*.apk"

    - name: Auto Commit Fix (Only on Success)
      if: success()
      env:
        PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-AI-Bot"
        git config --global user.email "gemini-bot@github.com"
        git remote set-url origin https://x-access-token:${PERSONAL_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git add .
        git commit -m "🤖 結構預修復成功並完成編譯 [skip ci]" || exit 0
        git push --force

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: error
