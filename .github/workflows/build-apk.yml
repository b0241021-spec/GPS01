name: Unzip and Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出倉庫（此時會把你的 ZIP 檔下載到雲端虛擬機）
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 核心步驟：在雲端自動解壓縮 ZIP 檔案
    # ⚠️ 請把下方的 您的檔案名稱.zip 改成你實際上傳的檔名（區分大小寫）
    - name: Unzip project files
      run: |
        unzip GPStest.zip
        ls -la # 列出解壓後的檔案，方便從日誌檢查路徑是否正確

    # 3. 設定 Java 環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4. 設定 Flutter 環境
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true
    # 5. 取得專案依賴套件（加上 working-directory）
    - name: Install dependencies
      working-directory: ./gps-simulator-android  # ⚠️ 請把「你的資料夾名稱」換成實際解壓出來的資料夾名
      run: flutter pub get

    # 6. 執行建置 APK（加上 working-directory）
    - name: Build APK
      working-directory: ./gps-simulator-android  # ⚠️ 請把「你的資料夾名稱」換成實際解壓出來的資料夾名
      run: flutter build apk --release

    # 7. 上傳編譯好的 APK（修改 path 路徑）
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        # ⚠️ 這裡的路徑前面也要加上「你的資料夾名稱」
        path: gps-simulator-android/build/app/outputs/flutter-apk/app-release.apk
