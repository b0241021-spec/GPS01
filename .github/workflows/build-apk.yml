name: Gemini AI Loop-Healing Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 👑 關鍵修正 1：指定這個 Actions 插件的工作目錄在子資料夾
    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    - name: Prepare Android Standard Environment
      working-directory: ./gps-simulator-android
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
          mkdir -p app/src/main/res/$dir
          cat << 'EOF' > app/src/main/res/$dir/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
          cp app/src/main/res/$dir/ic_launcher.png app/src/main/res/$dir/ic_launcher_round.png
        done

    # 👑 關鍵修正 2：只在正確包含 settings.gradle 的子目錄生成 Wrapper
    - name: Prepare Executable (Sub-folder Only)
      working-directory: ./gps-simulator-android
      run: |
        echo "=== 🛡️ 開始在子目錄建立 Gradle 執行檔 ==="
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew || true
        echo "=== 🛡️ 執行檔建立完畢 ==="

    - name: Build and Safe-Heal Loop with Gemini
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        API_URL: "https://generativelanguage.googleapis.com/v1beta/models"
      run: |
        cd gps-simulator-android
        MAX_ATTEMPTS=5
        ATTEMPT=1
        BUILD_SUCCESS=false

        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "========================================"
          echo "  🚀 開始第 $ATTEMPT 次嘗試編譯 APK..."
          echo "========================================"
          
          # 每次編譯前，先進行結構保底清洗
          TARGET_KT="app/src/main/java/com/gpssimulator/ui/MainActivity.kt"
          SERVICE_KT="app/src/main/java/com/gpssimulator/service/GPSSimulationService.kt"
          
          if [ -f "$TARGET_KT" ]; then
            sed -i -n '/package com.gpssimulator/,$p' "$TARGET_KT"
            sed -i '/package com.gpssimulator.ui/a \\nimport androidx.core.content.ContextCompat\nimport com.gpssimulator.service.GPSSimulationService' "$TARGET_KT" || true
          fi
          if [ -f "$SERVICE_KT" ]; then
            sed -i -n '/package com.gpssimulator/,$p' "$SERVICE_KT"
            sed -i '/package com.gpssimulator.service/a \\nimport androidx.core.content.ContextCompat\nimport com.gpssimulator.R' "$SERVICE_KT" || true
          fi

          if [ ! -f "./gradlew" ]; then
            echo "⚠️ 原始碼中未檢出 gradlew，正在原地重新補件..."
            gradle wrapper --gradle-version 7.5
            chmod +x gradlew
          fi

          # 執行編譯
          if ./gradlew assembleDebug --no-daemon > build.log 2>&1; then
            echo "✅ 恭喜！第 $ATTEMPT 次編譯成功！"
            BUILD_SUCCESS=true
            break
          else
            echo "❌ 第 $ATTEMPT 次編譯失敗。正在擷取錯誤日誌..."
            grep -B 3 -A 10 "e: " build.log > error.log || tail -n 50 build.log > error.log
            
            echo "--- 餵給 AI 的錯誤核心 ---"
            cat error.log
            echo "--------------------------"
            
            MODELS=("gemini-3.5-flash" "gemini-3.1-flash-lite")
            RESPONSE=""

            for MODEL in "${MODELS[@]}"; do
              PAYLOAD=$(jq -n --rawfile log error.log '{
                contents: [{
                  parts: [{
                    text: ("你是一個 Android 專家。專案編譯發生以下錯誤：\n" + $log + "\n\n請給出一行精準的 Linux sed 指令來修正這個錯誤。注意：切勿在 package 語句之前插入程式碼。你的指令必須針對錯誤發生的具體檔案與程式碼行進行精準取代。")
                  }]
                }],
                generationConfig: {
                  responseMimeType: "application/json",
                  responseSchema: {
                    type: "OBJECT",
                    properties: {
                      explanation: { type: "STRING" },
                      patch_command: { type: "STRING" }
                    },
                    required: ["patch_command"]
                  }
                }
              }')

              RESPONSE=$(curl -s -X POST "${API_URL}/${MODEL}:generateContent?key=${GEMINI_KEY}" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
              break
            done

            RAW_CONTENT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' 2>/dev/null)
            if [ ! -z "$RAW_CONTENT" ] && [ "$RAW_CONTENT" != "null" ]; then
              CLEANED_CONTENT=$(echo "$RAW_CONTENT" | sed 's/```json//g; s/```//g')
              EXPLANATION=$(echo "$CLEANED_CONTENT" | jq -r '.explanation' 2>/dev/null)
              PATCH_COMMAND=$(echo "$CLEANED_CONTENT" | jq -r '.patch_command' 2>/dev/null)
              
              echo "💡 Gemini 分析: $EXPLANATION"
              echo "⚙️ 執行 AI 修正: $PATCH_COMMAND"
              
              if [ ! -z "$PATCH_COMMAND" ] && [ "$PATCH_COMMAND" != "null" ]; then
                eval "$PATCH_COMMAND" || true
              fi
            fi
          fi
          
          ATTEMPT=$((ATTEMPT+1))
          sleep 2
        done

        if [ "$BUILD_SUCCESS" = false ]; then
          exit 1
        fi

    - name: Verify APK Location
      if: success()
      run: |
        find . -name "*.apk"

    - name: Auto Commit Fix (Only on Success)
      if: success()
      env:
        PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-AI-Bot"
        git config --global user.email "gemini-bot@github.com"
        git remote set-url origin https://x-access-token:${PERSONAL_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git add .
        git commit -m "🤖 結構預修復成功並完成編譯 [skip ci]" || exit 0
        git push --force

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: error
