name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \; || echo "No zip files found"

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== 👑 終極自癒防線：Python 腳本全面排毒相容性修復 ====================
    - name: Sanitize and Prepare Healer Scripts
      working-directory: ./gps-simulator-android
      run: |
        echo "🧼 [全環節防護] 正在強制清洗自癒指令碼中的 Windows 隱藏換行符號 (CRLF -> LF)..."
        
        # 1. 確保 gradlew 本身格式正確
        if [ -f gradlew ]; then sed -i 's/\r$//' gradlew; chmod +x gradlew; fi
        
        # 2. 👑 強制清洗兩支實體 Python 檔案，徹底消滅 L134 引號地獄
        if [ -f auto_healer.py ]; then sed -i 's/\r$//' auto_healer.py; fi
        if [ -f run_healing_pipeline.py ]; then sed -i 's/\r$//' run_healing_pipeline.py; fi
        
        echo "✅ 指令碼清洗完畢，已轉換為 Linux 標準 LF 格式！"

    # ==================== 執行全環節主控管線 ====================
    - name: Run Full-Process Auto-Healing Pipeline
      working-directory: ./gps-simulator-android
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"
      run: |
        # 👑 執行全功能純淨程式碼
        python3 run_healing_pipeline.py

    # ==================== 自動推送修復成果、大腦與診斷報告 ====================
    - name: Commit and Push Updates & Diagnostic Report
      if: always()
      run: |
        git config --global user.name "Gemini Auto-Healing Bot"
        git config --global user.email "gemini-bot@actions.github.com"
        
        git add -A
        if git diff-index --quiet HEAD --; then
          echo "No changes detected. Skipping commit."
        else
          echo "🤖 提交程式碼修復、大腦更新或失敗診斷報告..."
          git commit -m "chore(auto-heal): synced code repairs, cleaned brain library, and uploaded status report [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        fi

    # ==================== 匯出 APK 產物 ====================
    - name: Export Final Decided APK
      if: success()
      run: |
        mkdir -p output_apk
        find . -name "*.apk" -exec cp {} ./output_apk/gps-simulator-debug.apk \; || echo "No APK found"
        ls -l ./output_apk/

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-AutoHealed-APK
        path: ./output_apk/gps-simulator-debug.apk
