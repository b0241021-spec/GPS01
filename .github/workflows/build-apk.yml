name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== 步驟一：專案環境淨化 + 完整保留原始 UI 與邏輯 ====================
    - name: Step 1 - Smart Purge & Safe Configuration Injection
      run: |
        cd gps-simulator-android
        set -e
        
        # 1. 清理舊編譯殘留物
        rm -rf .gradle build app/build || true

        # 2. 暫存原本專案解壓出來的真正原始碼與 UI 資源
        mkdir -p /tmp/orig_src /tmp/orig_res
        cp -r app/src/main/java/* /tmp/orig_src/ 2>/dev/null || true
        cp -r app/src/main/res/* /tmp/orig_res/ 2>/dev/null || true

        # 3. 👑 使用 cat 安全寫入根目錄設定檔（徹底根除 echo 截斷與雙引號衝突）
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '7.3.1' apply false
            id 'org.jetbrains.kotlin.android' version '1.7.20' apply false
        }
        EOF

        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                gradlePluginPortal()
                google()
                mavenCentral()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = 'GPSSimulator'
        include ':app'
        EOF

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 4. 建立並安全寫入子模組 app/build.gradle
        mkdir -p app
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.gpssimulator'
            compileSdk 33
            defaultConfig {
                applicationId 'com.gpssimulator'
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName '1.0'
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_11
                targetCompatibility JavaVersion.VERSION_11
            }
            kotlinOptions {
                jvmTarget = '11'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.9.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.8.0'
        }
        EOF

        # 5. 👑 靈魂回歸：把原本專案設計的精美 UI 資源與核心邏輯程式碼放回正確位置
        mkdir -p app/src/main/java app/src/main/res
        cp -r /tmp/orig_res/* app/src/main/res/ 2>/dev/null || true
        cp -r /tmp/orig_src/* app/src/main/java/ 2>/dev/null || true

        # 6. 安全防防呆：補齊 Android 運作基本資源
        mkdir -p app/src/main/res/values
        if [ ! -f app/src/main/res/values/strings.xml ]; then
          echo '<resources><string name="app_name">GPS Simulator</string></resources>' > app/src/main/res/values/strings.xml
        fi
        
        for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
          mkdir -p app/src/main/res/$dir
          if [ ! -f app/src/main/res/$dir/ic_launcher.png ]; then
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/$dir/ic_launcher.png || true
            cp app/src/main/res/$dir/ic_launcher.png app/src/main/res/$dir/ic_launcher_round.png || true
          fi
        done

        # 7. 確保資訊清單配置正確
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".ui.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service android:name=".service.GPSSimulationService" android:exported="false" />
            </application>
        </manifest>
        EOF
        echo "✅ 環境配置與專案原始 UI 復原成功！"

    # ==================== 步驟二：環境建置 ====================
    - name: Step 2 - Prepare Executable (Sub-folder Only)
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew

    # ==================== 步驟三：最終編譯（解鎖核心日誌 + AI 自動醫療） ====================
    - name: Step 3 - Final Compile Production APK
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        API_URL: "https://generativelanguage.googleapis.com/v1beta/models"
      working-directory: ./gps-simulator-android
      run: |
        MAX_ATTEMPTS=2
        ATTEMPT=1
        BUILD_SUCCESS=false

        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "========================================"
          echo "  🚀 開始第 $ATTEMPT 次嘗試編譯精美介面版 APK..."
          echo "========================================"
          
          # 將詳細編譯資訊導入 build.log
          if ./gradlew clean assembleDebug --no-daemon --no-build-cache --info > build.log 2>&1; then
            echo "✅ 恭喜！包含完整設計介面的專案已編譯成功！"
            BUILD_SUCCESS=true
            break
          else
            echo "❌ 第 $ATTEMPT 次編譯失敗。正在為 AI 提取核心日誌..."
            tail -n 200 build.log > error3.log
            
            PAYLOAD=$(jq -n --rawfile log error3.log '{
              contents: [{ parts: [{ text: ("Android 專案原始碼編譯失敗，核心錯誤日誌如下：\n" + $log + "\n\n請給出一行精準的 Linux 指令修正錯誤。") }] }],
              generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { patch_command: { type: "STRING" } }, required: ["patch_command"] } }
            }')
            
            RESPONSE=$(curl -s -X POST "${API_URL}/gemini-3.5-flash:generateContent?key=${GEMINI_KEY}" -H "Content-Type: application/json" -d "$PAYLOAD")
            PATCH=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' | sed 's/```json//g; s/```//g' | jq -r '.patch_command' 2>/dev/null)
            
            if [ ! -z "$PATCH" ] && [ "$PATCH" != "null" ]; then
              echo "⚙️ 執行 AI 修正指令: $PATCH"
              eval "$PATCH" || true
            fi
          fi
          ATTEMPT=$((ATTEMPT+1))
        done
        
        cp build.log ../compiled_build.log || true
        if [ "$BUILD_SUCCESS" = false ]; then exit 1; fi

    # ==================== 步驟四：驗證並複製產出的 APK ====================
    - name: Step 4 - Verify and Copy APK
      if: success()
      run: |
        mkdir -p final-apk
        cp gps-simulator-android/app/build/outputs/apk/debug/app-debug.apk final-apk/GPS-Simulator-Repaired.apk || true

    # ==================== 步驟五：上傳正常的 APK 檔案 ====================
    - name: Upload APK Artifact (Only on Success)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Please-UNZIP-This-File-To-Get-APK
        path: final-apk/GPS-Simulator-Repaired.apk

    # ==================== 步驟六：失敗時強制備份全量日誌檔 ====================
    - name: Upload Full Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: COMPILATION-ERROR-LOGS
        path: compiled_build.log
