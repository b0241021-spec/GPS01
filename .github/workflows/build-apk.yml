name: Build Android Native APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 解壓縮專案
    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    # 3. 強制升級專案中的 Android Gradle 插件版本 (解決舊版 DataBinding 與新環境衝突)
    - name: Upgrade Android Gradle Plugin Version
      working-directory: ./gps-simulator-android
      run: |
        # 自動將 build.gradle 中的 com.android.tools.build:gradle 版本強制替換為 8.1.0
        sed -i 's/com.android.tools.build:gradle:[^"]*/com.android.tools.build:gradle:8.1.0/g' build.gradle || true
        sed -i "s/com.android.tools.build:gradle:[^']*/com.android.tools.build:gradle:8.1.0/g" build.gradle || true

    # 4. 設定現代化 Java 17 環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 5. 下載並建立現代化 Gradle Wrapper (8.2 版本)
    - name: Install and Generate Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2

    # 6. 給予 gradlew 執行權限
    - name: Grant execute permission for gradlew
      working-directory: ./gps-simulator-android
      run: chmod +x gradlew

    # 7. 編譯 Debug APK (加上 --info 確保萬一失敗有完整日誌)
    - name: Build with Gradle
      working-directory: ./gps-simulator-android
      run: ./gradlew assembleDebug --info

    # 8. 蒐集產出的 APK 並上傳
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: |
          gps-simulator-android/app/build/outputs/apk/debug/*.apk
