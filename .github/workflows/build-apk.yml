name: Build Android Native APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 解壓縮專案
    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    # 3. 設定 Java 11 (相容舊版 DataBinding 插件)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    # 4. 安裝並建立 Gradle Wrapper 7.5 (支援舊 API 的最後幾個版本之一)
    - name: Install and Generate Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -q gradle-7.5-bin.zip
        ./gradle-7.5/bin/gradle wrapper --gradle-version 7.5

    # 5. 給予 gradlew 執行權限
    - name: Grant execute permission for gradlew
      working-directory: ./gps-simulator-android
      run: chmod +x gradlew

    # 6. 編譯不需要金鑰的 Debug APK
    - name: Build with Gradle
      working-directory: ./gps-simulator-android
      run: ./gradlew assembleDebug

    # 7. 蒐集產出的 APK 並上傳
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: |
          gps-simulator-android/app/build/outputs/apk/debug/*.apk
