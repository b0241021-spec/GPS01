name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== 步驟一：修復 Kotlin 註解與 Data Class 欄位 ====================
    - name: Step 1 - Fix Kotlin Comments & Data Class Fields
      run: |
        cd gps-simulator-android
        set -e
        
        # 清理快取與舊程式
        rm -rf .gradle build app/build || true
        rm -rf app/src/main/java/com/gpssimulator/data/* || true
        mkdir -p app/src/main/java/com/gpssimulator/data
        mkdir -p app/src/main/java/com/gpssimulator/service
        mkdir -p app/src/main/java/com/gpssimulator/ui

        # 👑 1. 修正註解後的標準 Data Class
        cat << 'KOTLIN' > app/src/main/java/com/gpssimulator/data/SimulationState.kt
        package com.gpssimulator.data
        data class SimulationState(
            val latitude: Double = 25.0330,
            val longitude: Double = 121.5654,
            val currentLatitude: Double = 25.0330,
            val currentLongitude: Double = 121.5654,
            val isSimulating: Boolean = false,
            val speed: Float = 0f,
            val direction: Int = 0,
            val isTestRunning: Boolean = false
        )
        KOTLIN

        # 👑 2. 注入 Service 邏輯
        cat << 'KOTLIN' > app/src/main/java/com/gpssimulator/service/GPSSimulationService.kt
        package com.gpssimulator.service

        import android.app.NotificationChannel
        import android.app.NotificationManager
        import android.app.Service
        import android.content.Context
        import android.content.Intent
        import android.location.Location
        import android.location.LocationManager
        import android.os.Binder
        import android.os.Build
        import android.os.IBinder
        import android.os.SystemClock
        import androidx.core.app.NotificationCompat
        import com.gpssimulator.data.SimulationState
        import kotlinx.coroutines.*
        import kotlinx.coroutines.flow.MutableStateFlow
        import kotlinx.coroutines.flow.StateFlow

        class GPSSimulationService : Service() {
            private val _uiState = MutableStateFlow(SimulationState())
            val uiState: StateFlow<SimulationState> = _uiState

            private var job: Job? = null
            private val binder = LocalBinder()
            inner class LocalBinder : Binder() { fun getService(): GPSSimulationService = this@GPSSimulationService }
            override fun onBind(intent: Intent?): IBinder = binder

            override fun onCreate() {
                super.onCreate()
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    val channel = NotificationChannel("gps_channel", "GPS Simulation", NotificationManager.IMPORTANCE_LOW)
                    getSystemService(NotificationManager::class.java)?.createNotificationChannel(channel)
                }
                val notification = NotificationCompat.Builder(this, "gps_channel")
                    .setContentTitle("GPS Simulator Active")
                    .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                    .build()
                startForeground(1, notification)
            }

            fun updateParams(lat: Double, lng: Double, speed: Float, direction: Int) {
                _uiState.value = _uiState.value.copy(latitude = lat, longitude = lng, speed = speed, direction = direction)
                if (_uiState.value.isSimulating) {
                    restartSimulationLoop()
                }
            }

            fun toggleSimulation(enable: Boolean) {
                _uiState.value = _uiState.value.copy(isSimulating = enable)
                if (enable) restartSimulationLoop() else job?.cancel()
            }

            fun toggleTest(enable: Boolean) {
                _uiState.value = _uiState.value.copy(isTestRunning = enable)
            }

            private fun restartSimulationLoop() {
                job?.cancel()
                job = CoroutineScope(Dispatchers.Main).launch {
                    while (isActive && _uiState.value.isSimulating) {
                        val state = _uiState.value
                        val r = 6378137.0
                        val dn = (state.speed * (1000f / 3600f)) * Math.cos(Math.toRadians(state.direction.toDouble()))
                        val de = (state.speed * (1000f / 3600f)) * Math.sin(Math.toRadians(state.direction.toDouble()))
                        val dLat = dn / r
                        val dLon = de / (r * Math.cos(Math.toRadians(state.latitude)))
                        
                        val newLat = state.currentLatitude + Math.toDegrees(dLat)
                        val newLng = state.currentLongitude + Math.toDegrees(dLon)
                        
                        _uiState.value = _uiState.value.copy(currentLatitude = newLat, currentLongitude = newLng)
                        
                        try {
                            val locMgr = getSystemService(Context.LOCATION_SERVICE) as LocationManager
                            val providers = listOf(LocationManager.GPS_PROVIDER, LocationManager.NETWORK_PROVIDER)
                            for (p in providers) {
                                try { locMgr.addTestProvider(p, false, false, false, false, true, true, true, 1, 2) } catch(e:Exception){}
                                val mockLocation = Location(p).apply {
                                    latitude = newLat
                                    longitude = newLng
                                    altitude = 0.0
                                    time = System.currentTimeMillis()
                                    elapsedRealtimeNanos = SystemClock.elapsedRealtimeNanos()
                                    accuracy = 1.0f
                                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) speedAccuracyMetersPerSecond = 0.1f
                                }
                                locMgr.setTestProviderLocation(p, mockLocation)
                            }
                        } catch (e: Exception) { e.printStackTrace() }
                        
                        delay(1000)
                    }
                }
            }

            override fun onDestroy() { job?.cancel(); super.onDestroy() }
        }
        KOTLIN

        # 👑 3. 注入對接的 MainActivity
        cat << 'KOTLIN' > app/src/main/java/com/gpssimulator/ui/MainActivity.kt
        package com.gpssimulator.ui

        import android.Manifest
        import android.content.*
        import android.content.pm.PackageManager
        import android.os.*
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.app.ActivityCompat
        import androidx.lifecycle.lifecycleScope
        import com.gpssimulator.service.GPSSimulationService
        import kotlinx.coroutines.flow.collect
        import kotlinx.coroutines.launch

        class MainActivity : AppCompatActivity() {
            private var service: GPSSimulationService? = null
            private var isBound = false

            private var etLat: EditText? = null
            private var etLng: EditText? = null
            private var tvCurrentGps: TextView? = null
            private var sbSpeed: SeekBar? = null
            private var sbDirection: SeekBar? = null
            private var tvSpeedVal: TextView? = null
            private var tvDirVal: TextView? = null

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val layoutId = resources.getIdentifier("activity_main", "layout", packageName)
                if (layoutId != 0) setContentView(layoutId)

                val reqs = mutableListOf(Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.ACCESS_COARSE_LOCATION)
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) reqs.add(Manifest.permission.POST_NOTIFICATIONS)
                if (reqs.any { ActivityCompat.checkSelfPermission(this, it) != PackageManager.PERMISSION_GRANTED }) {
                    ActivityCompat.requestPermissions(this, reqs.toTypedArray(), 101)
                }

                etLat = findViewByNames("et_latitude", "etLatitude", "latitude_input", "lat")
                etLng = findViewByNames("et_longitude", "etLongitude", "longitude_input", "lng")
                tvCurrentGps = findViewByNames("tv_current_location", "currentLocationText", "tvCurrentGps", "location_display", "gps_status")
                sbSpeed = findViewByNames("sb_speed", "speedSeekBar", "speed_bar", "seekBarSpeed")
                sbDirection = findViewByNames("sb_direction", "directionSeekBar", "direction_bar", "seekBarDirection")
                tvSpeedVal = findViewByNames("tv_speed_value", "speedValue", "speed_text")
                tvDirVal = findViewByNames("tv_direction_value", "directionValue", "direction_text")
                
                val swView = findViewByNames<android.view.View>("switch_simulate", "simulateSwitch", "btn_simulate", "toggle_simulate", "mock_switch")
                val btnTestView = findViewByNames<android.view.View>("btn_start_test", "startTestButton", "btn_test", "test_button", "start_test")

                val seekListener = object : SeekBar.OnSeekBarChangeListener {
                    override fun onProgressChanged(s: SeekBar?, p: Int, f: Boolean) { syncParamsFromUi() }
                    override fun onStartTrackingTouch(s: SeekBar?) {}
                    override fun onStopTrackingTouch(s: SeekBar?) {}
                }
                sbSpeed?.setOnSeekBarChangeListener(seekListener)
                sbDirection?.setOnSeekBarChangeListener(seekListener)

                if (swView is CompoundButton) {
                    swView.setOnCheckedChangeListener { _, isChecked -> service?.toggleSimulation(isChecked) }
                } else {
                    swView?.setOnClickListener {
                        it.isSelected = !it.isSelected
                        service?.toggleSimulation(it.isSelected)
                    }
                }

                btnTestView?.setOnClickListener {
                    val currentStatus = service?.uiState?.value?.isTestRunning ?: false
                    service?.toggleTest(!currentStatus)
                    
                    val nextStatus = !currentStatus
                    etLat?.isEnabled = !nextStatus
                    etLng?.isEnabled = !nextStatus
                    sbSpeed?.isEnabled = !nextStatus
                    sbDirection?.isEnabled = !nextStatus
                    if (btnTestView is Button) {
                        btnTestView.text = if (nextStatus) "停止測試" else "開始測試"
                    }
                }

                val intent = Intent(this, GPSSimulationService::class.java)
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(intent) else startService(intent)
                bindService(intent, connection, Context.BIND_AUTO_CREATE)
            }

            private fun syncParamsFromUi() {
                val lat = etLat?.text?.toString()?.toDoubleOrNull() ?: 25.0330
                val lng = etLng?.text?.toString()?.toDoubleOrNull() ?: 121.5654
                val speed = sbSpeed?.progress?.toFloat() ?: 0f
                val dir = sbDirection?.progress ?: 0
                
                tvSpeedVal?.text = "${speed.toInt()} km/hr"
                tvDirVal?.text = "$dir°"
                service?.updateParams(lat, lng, speed, dir)
            }

            private val connection = object : ServiceConnection {
                override fun onServiceConnected(n: ComponentName?, s: IBinder?) {
                    service = (s as GPSSimulationService.LocalBinder).getService()
                    isBound = true
                    observeState()
                }
                override fun onServiceDisconnected(n: ComponentName?) { isBound = false }
            }

            private fun observeState() {
                lifecycleScope.launch {
                    service?.uiState?.collect { state ->
                        val gpsFormattedText = String.format("當前位置 (經緯度): %.6f, %.6f", state.currentLatitude, state.currentLongitude)
                        tvCurrentGps?.text = gpsFormattedText
                    }
                }
            }

            private fun <T : android.view.View> findViewByNames(vararg names: String): T? {
                for (name in names) {
                    val id = resources.getIdentifier(name, "id", packageName)
                    if (id != 0) return findViewById(id)
                }
                return null
            }

            override fun onDestroy() {
                super.onDestroy()
                if (isBound) { unbindService(connection); isBound = false }
            }
        }
        KOTLIN

        # 4. 配置 Manifest、鏡像與 Gradle 構建腳本
        rm -f build.gradle settings.gradle app/build.gradle app/src/main/AndroidManifest.xml || true
        
        cat << 'XML' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.gpssimulator">
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_MOCK_LOCATION" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="GPS Simulator" android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                <activity android:name=".ui.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
                <service android:name=".service.GPSSimulationService" android:enabled="true" android:exported="false" android:foregroundServiceType="location" />
            </application>
        </manifest>
        XML

        echo "plugins { id 'com.android.application' version '7.3.1' apply false; id 'org.jetbrains.kotlin.android' version '1.7.20' apply false }" > build.gradle
        cat << 'GRADLE' > settings.gradle
        pluginManagement { repositories { maven { url 'https://maven.aliyun.com/repository/public' }; maven { url 'https://maven.aliyun.com/repository/google' }; gradlePluginPortal(); google(); mavenCentral() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { maven { url 'https://maven.aliyun.com/repository/public' }; maven { url 'https://maven.aliyun.com/repository/google' }; google(); mavenCentral() } }
        rootProject.name = 'GPSSimulator'; include ':app'
        GRADLE
        echo "plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }" > app/build.gradle
        echo "android { namespace 'com.gpssimulator'; compileSdk 33; defaultConfig { applicationId 'com.gpssimulator'; minSdk 24; targetSdk 33; versionCode 1; versionName '1.0' }; buildTypes { release { minifyEnabled false } }; buildFeatures { viewBinding true; dataBinding true }; compileOptions { sourceCompatibility JavaVersion.VERSION_11; targetCompatibility JavaVersion.VERSION_11 }; kotlinOptions { jvmTarget = '11' } }" >> app/build.gradle
        echo "dependencies { implementation 'androidx.core:core-ktx:1.9.0'; implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.8.0'; implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.6.4'; implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.6.4'; implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.5.1' }" >> app/build.gradle

    # ==================== 步驟二：環境建置 ====================
    - name: Step 2 - Prepare Executable
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew

    # ==================== 步驟三：直接編譯出貨 ====================
    - name: Step 3 - Final Compile Production APK
      working-directory: ./gps-simulator-android
      run: |
        ./gradlew clean assembleDebug --no-daemon --no-build-cache

    - name: Auto Commit Fix (Only on Success)
      if: success()
      env:
        PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-AI-Bot"
        git config --global user.email "gemini-bot@github.com"
        git remote set-url origin https://x-access-token:${PERSONAL_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git add .
        git commit -m "🤖 滿血修正語法錯誤版 APK 出貨！ [skip ci]" || exit 0
        git push --force

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: "**/build/outputs/apk/debug/*.apk"
