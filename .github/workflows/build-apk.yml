name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \; || echo "No zip files found"

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== 👑 核心修復：只刪除衝突檔案 ====================
    - name: Step 1 - Eliminate Duplicated State File Only
      run: |
        cd gps-simulator-android
        # 只刪除重複定義 (Redeclaration) 的 GPSSimulatorState.kt
        rm -f app/src/main/java/com/gpssimulator/data/GPSSimulatorState.kt || true
        echo "Cleaned up conflicting state file."

    # ==================== 👑 核心修復：只修正 UI 筆誤 ====================
    - name: Step 2 - Fix UI Variable Typos via Linux Sed
      run: |
        cd gps-simulator-android
        # 將 MainActivity.kt 內誤植的 tvCustomCurrentGps 替換為正確定義的 tvCurrentGps
        find app/src/main/java -name "MainActivity.kt" -exec sed -i 's/tvCustomCurrentGps/tvCurrentGps/g' {} \;
        echo "Successfully patched MainActivity variable names."

    # ==================== 建立 Gradle Wrapper ====================
    - name: Step 3 - Create Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew

    # ==================== 正式編譯 ====================
    - name: Step 4 - Final Compile Production APK
      working-directory: ./gps-simulator-android
      run: |
        ./gradlew clean assembleDebug --no-daemon --no-build-cache

    # ==================== 匯出並上傳 APK ====================
    - name: Step 5 - Export APK to Root Directory
      run: |
        mkdir -p output_apk
        find . -name "*.apk" -exec cp {} ./output_apk/gps-simulator-debug.apk \;
        echo "=== Exported APK File List: ==="
        ls -l ./output_apk/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: ./output_apk/gps-simulator-debug.apk
        if-no-files-found: error
