name: Gemini AI Loop-Healing Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    - name: Prepare Android Standard Environment
      working-directory: ./gps-simulator-android
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
          mkdir -p app/src/main/res/$dir
          cat << 'EOF' > app/src/main/res/$dir/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
          cp app/src/main/res/$dir/ic_launcher.png app/src/main/res/$dir/ic_launcher_round.png
        done

    # 👑 核心大絕招：根據 Gemini 分析出的黃金情報，進行地毯式無痛修復
    - name: Hard Fix Code Defect Base on Gemini Insight
      working-directory: ./gps-simulator-android
      run: |
        TARGET_KT="app/src/main/java/com/gpssimulator/ui/MainActivity.kt"
        SERVICE_KT="app/src/main/java/com/gpssimulator/service/GPSSimulationService.kt"
        
        echo "=== 🛠️ 開始執行全方位靜態代碼絕殺修復 ==="
        
        # 1. 強力清洗兩大檔案的頭部，幹掉所有重複衝突的 import
        if [ -f "$TARGET_KT" ]; then
          sed -i -n '/package com.gpssimulator/,$p' "$TARGET_KT"
          sed -i '/package com.gpssimulator.ui/a \\nimport androidx.core.content.ContextCompat\nimport com.gpssimulator.service.GPSSimulationService\nimport androidx.appcompat.app.AlertDialog' "$TARGET_KT"
          
          # 修復 EditText .text 賦值問題
          sed -i 's/\.text\s*=\s*Editable\.Factory\.getInstance()\.newEditable(\(.*\))/.setText(\1)/g' "$TARGET_KT" || true
          sed -i 's/\.text\s*=\s*\(.*\)/.setText(\1)/g' "$TARGET_KT" || true
          
          # 解鎖 Android 13 權限低版本編譯相容
          sed -i 's/Build\.VERSION_CODES\.TIRAMISU/33/g' "$TARGET_KT" || true
          sed -i 's/Manifest\.permission\.POST_NOTIFICATIONS/"android.permission.POST_NOTIFICATIONS"/g' "$TARGET_KT" || true
          
          # 強制限定 AlertDialog 命名空間預防 lambda 崩潰
          sed -i 's/\bAlertDialog\b/androidx.appcompat.app.AlertDialog/g' "$TARGET_KT" || true
        fi
        
        if [ -f "$SERVICE_KT" ]; then
          sed -i -n '/package com.gpssimulator/,$p' "$SERVICE_KT"
          sed -i '/package com.gpssimulator.service/a \\nimport androidx.core.content.ContextCompat\nimport com.gpssimulator.R' "$SERVICE_KT"
          
          # 同步修復 Service 內可能存在的 Android 13 權限符號
          sed -i 's/Build\.VERSION_CODES\.TIRAMISU/33/g' "$SERVICE_KT" || true
          sed -i 's/Manifest\.permission\.POST_NOTIFICATIONS/"android.permission.POST_NOTIFICATIONS"/g' "$SERVICE_KT" || true
        fi
        
        echo "=== ✅ 代碼缺陷修復完畢 ==="

    - name: Prepare Executable (Sub-folder Only)
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew || true

    # 直接送進去打包！
    - name: Final Compile Production APK
      working-directory: ./gps-simulator-android
      run: |
        echo "🚀 開始最終編譯打包..."
        ./gradlew assembleDebug --no-daemon

    - name: Verify APK Location
      if: success()
      run: |
        find . -name "*.apk"

    - name: Auto Commit Fix (Only on Success)
      if: success()
      env:
        PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-AI-Bot"
        git config --global user.email "gemini-bot@github.com"
        git remote set-url origin https://x-access-token:${PERSONAL_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git add .
        git commit -m "🤖 根據 Gemini 智慧分析全量修復代碼並完工 [skip ci]" || exit 0
        git push --force

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: error
