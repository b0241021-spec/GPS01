name: Check Project Structure

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List files and Unzip
      run: |
        echo "=== 1. 檢查你的 GitHub 倉庫根目錄有什麼檔案 ==="
        ls -la
        
        echo "=== 2. 開始解壓縮所有附近的 ZIP 檔案 ==="
        find . -name "*.zip" -exec unzip -o {} \;
        
        echo "=== 3. 解壓完成！列出所有解壓後的第一層檔案與資料夾 ==="
        ls -la
        
        echo "=== 4. 全盤大搜索：這專案到底有哪些檔案？ ==="
        find . -maxdepth 3 -not -path '*/.*'
