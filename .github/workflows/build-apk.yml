name: Gemini AI Loop-Healing Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Prepare Android Standard Environment
      working-directory: ./gps-simulator-android
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
          mkdir -p app/src/main/res/$dir
          cat << 'EOF' > app/src/main/res/$dir/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
          cp app/src/main/res/$dir/ic_launcher.png app/src/main/res/$dir/ic_launcher_round.png
        done

    - name: Prepare Executable
      working-directory: ./gps-simulator-android
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    # 👑 終極校正：確保所有 log 擷取與 AI 修正都在同一個資料夾 (gps-simulator-android) 內進行
    - name: Build and Auto-Heal Loop with Gemini
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        API_URL: "https://generativelanguage.googleapis.com/v1beta/models"
      run: |
        cd gps-simulator-android
        MAX_ATTEMPTS=100
        ATTEMPT=1
        BUILD_SUCCESS=false

        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "========================================"
          echo "  🚀 開始第 $ATTEMPT 次嘗試編譯 APK..."
          echo "========================================"
          
          # 加上 --info 確保 log 夠詳細
          if ./gradlew assembleDebug --no-daemon --info > build.log 2>&1; then
            echo "✅ 恭喜！第 $ATTEMPT 次編譯成功！"
            BUILD_SUCCESS=true
            break
          else
            echo "❌ 第 $ATTEMPT 次編譯失敗。正在擷取錯誤日誌..."
            # 💡 修正 1：直接過濾 Kotlin 錯誤和前後 40 行，讓 AI 精準咬住錯誤
            grep -B 10 -A 30 "Unresolved reference" build.log > error.log || tail -n 80 build.log > error.log
            
            echo "--- 餵給 AI 的錯誤片段 ---"
            cat error.log
            echo "--------------------------"
            
            MODELS=("gemini-3.5-flash" "gemini-3.1-flash-lite" "gemini-2.5-flash")
            RESPONSE=""
            SUCCESSFUL_MODEL=""

            for MODEL in "${MODELS[@]}"; do
              echo "📡 嘗試調用模型：$MODEL"
              RETRY_COUNT=1
              MAX_RETRIES=3
              BACKOFF=5

              while [ $RETRY_COUNT -le $MAX_RETRIES ]; do
                echo "   👉 向 $MODEL 發送請求 (嘗試第 $RETRY_COUNT/$MAX_RETRIES 次)..."
                
                PAYLOAD=$(jq -n --rawfile log error.log --arg m "$MODEL" '{
                  contents: [{
                    parts: [{
                      text: ("你是一個資深 Android 專家，目前專案編譯發生以下錯誤：\n" + $log + "\n\n請給出一段精準的 Linux sed 命令幫我修復這個檔案。注意當前工作目錄為專案根目錄。")
                    }]
                  }],
                  generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                      type: "OBJECT",
                      properties: {
                        explanation: {
                          type: "STRING",
                          description: "簡短解釋錯誤原因以及如何修正"
                        },
                        patch_command: {
                          type: "STRING",
                          description: "精準的單行 Linux sed 指令來修正專案，例如: sed -i \"s/old/new/g\" app/src/main/java/com/gpssimulator/ui/MainActivity.kt"
                        }
                      },
                      required: ["patch_command"]
                    }
                  }
                }')

                RESPONSE=$(curl -s -X POST "${API_URL}/${MODEL}:generateContent?key=${GEMINI_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "$PAYLOAD")

                API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message' 2>/dev/null)
                API_CODE=$(echo "$RESPONSE" | jq -r '.error.code' 2>/dev/null)

                if [ ! -z "$API_ERROR" ] && [ "$API_ERROR" != "null" ]; then
                  echo "   ⚠️ API 回傳錯誤 ($API_CODE): $API_ERROR"
                  if [ "$API_CODE" = "503" ] || [ "$API_CODE" = "429" ]; then
                    echo "   ⏳ 伺服器忙碌中，等待 $BACKOFF 秒後進行退避重試..."
                    sleep $BACKOFF
                    BACKOFF=$((BACKOFF * 2))
                    RETRY_COUNT=$((RETRY_COUNT + 1))
                  else
                    break 2
                  fi
                else
                  SUCCESSFUL_MODEL=$MODEL
                  break 2
                fi
              done
            done

            RAW_CONTENT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' 2>/dev/null)
            
            if [ -z "$RAW_CONTENT" ] || [ "$RAW_CONTENT" = "null" ]; then
              echo "⚠️ 無化解析模型回傳內容。"
              PATCH_COMMAND="null"
            else
              CLEANED_CONTENT=$(echo "$RAW_CONTENT" | sed 's/```json//g; s/```//g')
              EXPLANATION=$(echo "$CLEANED_CONTENT" | jq -r '.explanation' 2>/dev/null)
              PATCH_COMMAND=$(echo "$CLEANED_CONTENT" | jq -r '.patch_command' 2>/dev/null)
              echo "💡 Gemini 分析: $EXPLANATION"
              echo "⚙️ 預期執行指令: $PATCH_COMMAND"
            fi
            
            if [ ! -z "$PATCH_COMMAND" ] && [ "$PATCH_COMMAND" != "null" ]; then
              echo "執行 AI Patch..."
              eval "$PATCH_COMMAND" || true
            fi
          fi
          
          ATTEMPT=$((ATTEMPT+1))
          sleep 3
        done

        if [ "$BUILD_SUCCESS" = false ]; then
          exit 1
        fi

    - name: Verify APK Location
      if: success()
      run: |
        find . -name "*.apk"

    - name: Auto Commit Gemini Fix (Only on Success)
      if: success()
      env:
        PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-AI-Bot"
        git config --global user.email "gemini-bot@github.com"
        git remote set-url origin https://x-access-token:${PERSONAL_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git add .
        git commit -m "🤖 Gemini AI 全自動自我修復成功 [skip ci]" || exit 0
        git push --force

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: error
