name: Build Android Native APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 解壓縮專案
    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    # 3. 設定 Java 環境 (降回支援舊版 AGP 的 Java 11 以確保相容性)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    # 4. 安裝並建立相容的 Gradle Wrapper (降級至 7.2 版本)
    - name: Install and Generate Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        wget https://services.gradle.org/distributions/gradle-7.2-bin.zip
        unzip -q gradle-7.2-bin.zip
        ./gradle-7.2/bin/gradle wrapper --gradle-version 7.2

    # 5. 給予新生成的 gradlew 執行權限
    - name: Grant execute permission for gradlew
      working-directory: ./gps-simulator-android
      run: chmod +x gradlew

    # 6. 執行編譯 Release APK
    - name: Build with Gradle
      working-directory: ./gps-simulator-android
      run: ./gradlew assembleRelease

    # 7. 自動搜尋編譯完成的 APK 並上傳
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: |
          gps-simulator-android/app/build/outputs/apk/release/*.apk
          gps-simulator-android/app/build/outputs/apk/debug/*.apk
