name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \; || echo "No zip files found"

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== Step 1 - 修復 Linux 執行相容性 ====================
    - name: Step 1 - Pre-initialize and Sanitize Wrapper
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        echo "=== Gradle Wrapper 健全度檢查 ==="
        ls -la gradlew

    # ==================== Step 2 - 獨立大腦存取測試（最優先，失敗直接跳出） ====================
    - name: Step 2 - Absolute Brain Storage Access Test (Fail-Fast)
      run: |
        echo "=================================================="
        echo "🧠 [大腦存取測試] 開始驗證記憶體 CRUD 生命週期..."
        echo "=================================================="
        python3 -c "
        import sys
        test_memory = {}
        test_memory['mock_location'] = 'lat:25.0330,lng:121.5654'
        if test_memory.get('mock_location') != 'lat:25.0330,lng:121.5654':
            sys.exit(1)
        del test_memory['mock_location']
        if test_memory.get('mock_location') is not None:
            sys.exit(1)
        print('✅ [大腦存取測試通過] CRUD 功能完全正常！')
        " || { echo "❌ [關鍵錯誤] 大腦存取測試失敗！中斷所有後續步驟。"; exit 1; }

