name: Build Android Native APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 解壓縮專案
    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \;

    # 3. 設定 Java 環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4. 安裝並建立指定版本的 Gradle Wrapper (升級至 8.0 版本)
    - name: Install and Generate Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        # 使用 JDK 內建功能直接下載並安裝指定的 Gradle 8.0 版本
        # 這樣就不會用到系統 4.4.1 的老舊版本
        wget https://services.gradle.org/distributions/gradle-8.0-bin.zip
        unzip -q gradle-8.0-bin.zip
        ./gradle-8.0/bin/gradle wrapper --gradle-version 8.0

    # 5. 給予新生成的 gradlew 執行權限
    - name: Grant execute permission for gradlew
      working-directory: ./gps-simulator-android
      run: chmod +x gradlew

    # 6. 執行編譯 Release APK
    - name: Build with Gradle
      working-directory: ./gps-simulator-android
      run: ./gradlew assembleRelease

    # 7. 自動搜尋編譯完成的 APK 並上傳
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: |
          gps-simulator-android/app/build/outputs/apk/release/*.apk
          gps-simulator-android/app/build/outputs/apk/debug/*.apk
