name: Gemini AI Full-Process Auto-Healing Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Unzip project files
      run: |
        find . -name "*.zip" -exec unzip -o {} \; || echo "No zip files found"

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'
        build-root-directory: ./gps-simulator-android

    # ==================== 👑 關鍵步驟：完全清除所有先前殘留的覆寫檔案 ====================
    - name: Step 1 - Hard Reset to Original Code & Remove Duplicates
      run: |
        cd gps-simulator-android
        
        # 1. 強制還原 MainActivity 避免任何先前殘留的 sed/python 修改痕跡
        git checkout -- app/src/main/java/com/gpssimulator/ui/MainActivity.kt || echo "Original MainActivity intact"
        git checkout -- app/src/main/java/com/gpssimulator/service/GPSSimulationService.kt || echo "Original Service intact"
        
        # 2. 徹底刪除在先前 Actions 中錯誤產生的「重複」狀態檔案
        # 這樣就不會再有 Redeclaration: SimulationState 錯誤！
        rm -f app/src/main/java/com/gpssimulator/data/SimulationState.kt || true
        
        echo "Successfully cleaned up duplicate files and restored original codebase."

    # ==================== 建立 Gradle Wrapper ====================
    - name: Step 2 - Create Gradle Wrapper
      working-directory: ./gps-simulator-android
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew

    # ==================== 正式編譯 ====================
    - name: Step 3 - Final Compile Production APK
      working-directory: ./gps-simulator-android
      run: |
        ./gradlew clean assembleDebug --no-daemon --no-build-cache

    # ==================== 匯出並上傳 APK ====================
    - name: Step 4 - Export APK to Root Directory
      run: |
        mkdir -p output_apk
        find . -name "*.apk" -exec cp {} ./output_apk/gps-simulator-debug.apk \;
        echo "=== Exported APK File List: ==="
        ls -l ./output_apk/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: ./output_apk/gps-simulator-debug.apk
        if-no-files-found: error
